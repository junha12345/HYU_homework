<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마이링크</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      color: #222;
    }
    .card {
      max-width: 520px;
      margin: 0 auto;
      padding: 32px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      margin-bottom: 12px;
    }
    p {
      color: #555;
    }
    a {
      display: block;
      margin: 12px 0;
      padding: 12px;
      border-radius: 10px;
      background: #222;
      color: white;
      text-decoration: none;
    }
    a:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>마이링크</h1>
    <p>나의 링크를 모아두는 페이지입니다.</p>

    <a href="https://github.com/" target="_blank">Github</a>
    <a href="https://www.naver.com/" target="_blank">Naver</a>
    <a href="https://www.google.com/" target="_blank">Google</a>
  </div>
</body>
</html>
